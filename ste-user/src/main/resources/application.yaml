server:
  port: 8081

spring:
  application:
    name: ste-user
  datasource:
    url: jdbc:mysql://localhost:3306/ste_user?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

shuaitier:
  jwt:
    secret: shuaitier-jwt-secret-key-please-change-2026
    expire-minutes: 120
    refresh-expire-minutes: 10080
    issuer: ste-user
